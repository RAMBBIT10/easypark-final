services:

  postgres:
    image: postgres:17-alpine
    container_name: easypark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: easy_park
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - easypark_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d easy_park"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: easypark-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: easypark-backend:local
    container_name: easypark-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/easy_park
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: easypark-super-secret-jwt-key-2026-universidad-cordoba
      JWT_EXPIRATION: 86400000
      RESEND_API_KEY: ${RESEND_API_KEY:-test-key}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-dev-fzdzwkcpgueyww5e.us.auth0.com}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-trl6ugAyGyvS4vvmyUtdvziqXpLra0G6}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s

  kong:
    image: kong:3.6
    container_name: easypark-kong
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    expose:
      - "8000"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  waf:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: easypark-waf
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
    environment:
      SERVERNAME: localhost
      BACKEND: http://kong:8000
      RESOLVERS: "127.0.0.11"
      RESOLVER_CONFIG: "valid=10s ipv6=off"
      PROXY_PRESERVE_HOST: "on"
      PORT: "8080"
      MODSEC_RULE_ENGINE: "On"
      BLOCKING_PARANOIA: 1
      PARANOIA: 1
      ANOMALY_INBOUND: 10
      ANOMALY_OUTBOUND: 4
      REPORTING_LEVEL: 2
      ALLOWED_METHODS: "GET HEAD POST PUT PATCH DELETE OPTIONS"
      ALLOWED_REQUEST_CONTENT_TYPE: "|application/json| |application/x-www-form-urlencoded| |multipart/form-data| |text/plain|"
      SET_REAL_IP_FROM: "0.0.0.0/0"
      REAL_IP_HEADER: X-Forwarded-For
      REAL_IP_RECURSIVE: "On"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: easypark-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.0
    container_name: easypark-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  easypark_pgdata:
    name: easypark_pgdata