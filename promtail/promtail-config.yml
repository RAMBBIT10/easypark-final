server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://easypark-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: easypark-backend
    docker_sd_configs:
      - host: tcp://host.docker.internal:2375
        refresh_interval: 5s
        filters:
          - name: name
            values: [easypark-backend]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
